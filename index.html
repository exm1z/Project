<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фінансовий журнал</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Фінансовий журнал</h1>
  </header>

  <main>
    <div class="stats">
      <div class="card">
        <p>Доходи</p>
        <h2 id="totalIncome" class="income">0 грн</h2>
      </div>

      <div class="card">
        <p>Витрати</p>
        <h2 id="totalExpense" class="expense">0 грн</h2>
      </div>

      <div class="card">
        <p>Баланс</p>
        <h2 id="balance" class="balance">0 грн</h2>
      </div>

      <div class="card">
        <p>Кількість записів</p>
        <h2 id="recordsCount" class="count">0</h2>
      </div>
    </div>

    <section>
      <h2>Додати операцію</h2>
      <p class="subtitle">Оберіть тип, категорію, суму та дату</p>

      <form id="financeForm">
        <select id="type">
          <option value="income">Дохід</option>
          <option value="expense">Витрата</option>
        </select>

        <select id="category"></select>
        <input id="amount" type="number" placeholder="Сума">
        <input id="date" type="date">

        <button type="submit">Додати</button>
      </form>
    </section>

    <section>
      <h2>Історія операцій</h2>
      <div class="filters">
        <input id="search" type="text" placeholder="Пошук за категорією">
        <select id="filterType">
          <option value="all">Усі операції</option>
          <option value="income">Доходи</option>
          <option value="expense">Витрати</option>
        </select>
      </div>
      <div id="recordsList"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
